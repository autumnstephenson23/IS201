<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    flex-direction:column;
}
canvas{
    background:#1e1e1e;
    border:3px solid #4caf50;
    box-shadow:0 0 20px #4caf50;
}
.score{ margin-top:10px; font-size:20px; }
</style>
</head>
<body>

<h1>🐍 Snake Game</h1>
<canvas id="game" width="400" height="400"></canvas>
<div class="score">Score: <span id="score">0</span></div>
<p>Press any arrow key to start</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake, velocity, food, score, gameOver, gameStarted;

function init(){
    snake = [{x:10,y:10}];
    velocity = {x:0,y:0};
    food = {x:5,y:5};
    score = 0;
    gameOver = false;
    gameStarted = false;
    document.getElementById("score").innerText = score;
}
init();

function gameLoop(){
    setTimeout(() => requestAnimationFrame(gameLoop), 1000/10);
    if(!gameStarted || gameOver) {
        draw();
        if(gameOver){
            ctx.fillStyle="white";
            ctx.font="40px Arial";
            ctx.fillText("Game Over",90,200);
            ctx.font="20px Arial";
            ctx.fillText("Press Space to Restart",60,240);
        }
        return;
    }
    update();
    draw();
}

function update(){
    const head = {x: snake[0].x + velocity.x, y: snake[0].y + velocity.y};

    // wall collision
    if(head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount){
        gameOver = true;
        return;
    }

    // self collision (skip head index 0)
    for(let i=0;i<snake.length;i++){
        if(head.x === snake[i].x && head.y === snake[i].y){
            gameOver = true;
            return;
        }
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
        score++;
        document.getElementById("score").innerText = score;
        placeFood();
    } else {
        snake.pop();
    }
}

function draw(){
    ctx.fillStyle="#1e1e1e";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#4caf50";
    snake.forEach(part=>{
        ctx.fillRect(part.x*gridSize, part.y*gridSize, gridSize-2, gridSize-2);
    });

    ctx.fillStyle="#ff5252";
    ctx.fillRect(food.x*gridSize, food.y*gridSize, gridSize-2, gridSize-2);
}

function placeFood(){
    food.x = Math.floor(Math.random()*tileCount);
    food.y = Math.floor(Math.random()*tileCount);
}

document.addEventListener("keydown", e => {
    if(e.code === "Space" && gameOver){
        init();
        return;
    }

    if(!gameStarted) gameStarted = true;

    switch(e.key){
        case "ArrowUp": if(velocity.y !== 1) velocity={x:0,y:-1}; break;
        case "ArrowDown": if(velocity.y !== -1) velocity={x:0,y:1}; break;
        case "ArrowLeft": if(velocity.x !== 1) velocity={x:-1,y:0}; break;
        case "ArrowRight": if(velocity.x !== -1) velocity={x:1,y:0}; break;
    }
});

gameLoop();
</script>
</body>
</html>
